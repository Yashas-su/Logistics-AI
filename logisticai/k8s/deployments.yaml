---
apiVersion: v1
kind: Namespace
metadata:
  name: logistics

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: optimizer-service
  namespace: logistics
spec:
  replicas: 5
  selector:
    matchLabels: { app: optimizer-service }
  strategy:
    type: RollingUpdate
    rollingUpdate: { maxUnavailable: 1, maxSurge: 2 }
  template:
    metadata:
      labels: { app: optimizer-service }
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels: { app: optimizer-service }
      containers:
        - name: optimizer
          image: gcr.io/PROJECT_ID/optimizer:latest
          ports: [{ containerPort: 8001 }]
          resources:
            requests: { cpu: "1", memory: "2Gi" }
            limits:   { cpu: "2", memory: "4Gi" }
          env:
            - { name: REDIS_HOST,   valueFrom: { secretKeyRef: { name: logisticai-secrets, key: redis-host } } }
            - { name: JWT_SECRET,   valueFrom: { secretKeyRef: { name: logisticai-secrets, key: jwt-secret } } }
            - { name: DEMO_MODE,    value: "false" }
          readinessProbe:
            httpGet: { path: /healthz, port: 8001 }
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: 8001 }
            failureThreshold: 3
            periodSeconds: 10

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-service
  namespace: logistics
spec:
  replicas: 3
  selector:
    matchLabels: { app: inference-service }
  template:
    metadata:
      labels: { app: inference-service }
    spec:
      containers:
        - name: inference
          image: gcr.io/PROJECT_ID/inference:latest
          ports: [{ containerPort: 8002 }]
          resources:
            requests: { cpu: "2", memory: "4Gi" }
            limits:   { cpu: "4", memory: "8Gi" }
          env:
            - { name: REDIS_HOST, valueFrom: { secretKeyRef: { name: logisticai-secrets, key: redis-host } } }
          readinessProbe:
            httpGet: { path: /healthz, port: 8002 }
            initialDelaySeconds: 15
            periodSeconds: 5

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-hub
  namespace: logistics
spec:
  replicas: 3
  selector:
    matchLabels: { app: ws-hub }
  template:
    metadata:
      labels: { app: ws-hub }
    spec:
      containers:
        - name: ws-hub
          image: gcr.io/PROJECT_ID/ws-hub:latest
          ports: [{ containerPort: 8080 }]
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi" }
          env:
            - { name: JWT_SECRET, valueFrom: { secretKeyRef: { name: logisticai-secrets, key: jwt-secret } } }
          readinessProbe:
            httpGet: { path: /healthz, port: 8080 }
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: optimizer-svc
  namespace: logistics
spec:
  selector: { app: optimizer-service }
  ports: [{ port: 80, targetPort: 8001 }]

---
apiVersion: v1
kind: Service
metadata:
  name: inference-svc
  namespace: logistics
spec:
  selector: { app: inference-service }
  ports: [{ port: 80, targetPort: 8002 }]

---
apiVersion: v1
kind: Service
metadata:
  name: ws-hub-svc
  namespace: logistics
spec:
  selector: { app: ws-hub }
  ports: [{ port: 80, targetPort: 8080 }]

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: optimizer-pdb
  namespace: logistics
spec:
  minAvailable: 3
  selector:
    matchLabels: { app: optimizer-service }

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: optimizer-hpa
  namespace: logistics
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: optimizer-service
  minReplicas: 5
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 60 }
    - type: Resource
      resource:
        name: memory
        target: { type: Utilization, averageUtilization: 70 }
