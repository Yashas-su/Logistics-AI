---
# k8s/namespace.yaml
apiVersion: v1
kind: Namespace
metadata:
  name: logistics

---
# k8s/optimizer-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: optimizer-service
  namespace: logistics
spec:
  replicas: 5
  selector:
    matchLabels:
      app: optimizer-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
  template:
    metadata:
      labels:
        app: optimizer-service
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
      containers:
        - name: optimizer
          image: gcr.io/PROJECT_ID/optimizer:latest
          ports:
            - containerPort: 8001
          env:
            - name: REDIS_HOST
              valueFrom:
                secretKeyRef:
                  name: logistics-secrets
                  key: redis-host
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: logistics-secrets
                  key: jwt-secret
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "2Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8001
            failureThreshold: 3
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: optimizer-service
  namespace: logistics
spec:
  selector:
    app: optimizer-service
  ports:
    - port: 80
      targetPort: 8001

---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: optimizer-pdb
  namespace: logistics
spec:
  minAvailable: 3
  selector:
    matchLabels:
      app: optimizer-service

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: optimizer-hpa
  namespace: logistics
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: optimizer-service
  minReplicas: 5
  maxReplicas: 50
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60

---
# k8s/inference-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inference-service
  namespace: logistics
spec:
  replicas: 3
  selector:
    matchLabels:
      app: inference-service
  template:
    metadata:
      labels:
        app: inference-service
    spec:
      containers:
        - name: inference
          image: gcr.io/PROJECT_ID/inference:latest
          ports:
            - containerPort: 8002
          resources:
            requests:
              cpu: "1"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8002
            initialDelaySeconds: 15
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: inference-service
  namespace: logistics
spec:
  selector:
    app: inference-service
  ports:
    - port: 80
      targetPort: 8002

---
# k8s/ws-hub-deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ws-hub
  namespace: logistics
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ws-hub
  template:
    metadata:
      labels:
        app: ws-hub
    spec:
      containers:
        - name: ws-hub
          image: gcr.io/PROJECT_ID/ws-hub:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1"
              memory: "1Gi"

---
apiVersion: v1
kind: Service
metadata:
  name: ws-hub
  namespace: logistics
spec:
  selector:
    app: ws-hub
  ports:
    - port: 80
      targetPort: 8080

---
# k8s/secrets.yaml (values must be base64 encoded — replace before applying)
apiVersion: v1
kind: Secret
metadata:
  name: logistics-secrets
  namespace: logistics
type: Opaque
stringData:
  redis-host: "YOUR_REDIS_HOST"
  jwt-secret: "YOUR_JWT_SECRET_MIN_32_CHARS"
  db-url: "postgresql://USER:PASS@HOST/logistics"
